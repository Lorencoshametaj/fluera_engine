name: nebula_engine
description: >
  A professional 2D canvas engine for Flutter.
  Provides drawing tools, brushes, layers, shapes, text, 
  images, and a complete scene graph system.
version: 1.0.0

environment:
  sdk: ^3.7.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.0.3
  # Storage & IO
  path_provider: ^2.1.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.8.3
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  # Utilities
  crypto: ^3.0.6


dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.nebulaengine.nebula_engine
        pluginClass: NebulaEnginePlugin
      ios:
        pluginClass: NebulaEnginePlugin
  shaders:
    - shaders/pencil_pro.frag
    - shaders/fountain_pen_pro.frag
    - shaders/texture_overlay.frag
    - shaders/brush_stamp.frag
    - shaders/watercolor.frag
    - shaders/marker.frag
    - shaders/charcoal.frag
    - shaders/oil_paint.frag
    - shaders/spray_paint.frag
    - shaders/neon_glow.frag
    - shaders/ink_wash.frag
  assets:
    - assets/textures/
    - assets/textures/images/
