name: fluera_engine
description: >
  A professional 2D canvas engine for Flutter. Pressure-sensitive brushes,
  infinite canvas, scene graph, real-time collaboration, PDF annotation,
  export pipeline, and 60 FPS rendering with GPU shaders.
version: 1.0.0
homepage: https://fluera.dev
repository: https://github.com/looponia/fluera_engine
issue_tracker: https://github.com/looponia/fluera_engine/issues
topics:
  - canvas
  - drawing
  - 2d-engine
  - graphics
  - scene-graph

environment:
  sdk: ^3.7.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.0.3
  # Storage & IO
  path_provider: ^2.1.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.8.3
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  # Utilities
  crypto: ^3.0.6
  meta: ^1.11.0
  vector_math: ^2.1.4
  logging: ^1.2.0
  sqflite_common: ^2.5.4
  # ONNX Runtime — used internally by LaTeX add-on module source files.
  onnxruntime_v2: ^1.23.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.flueraengine.fluera_engine
        pluginClass: FlueraEnginePlugin
      ios:
        pluginClass: FlueraEnginePlugin
  shaders:
    - shaders/pencil_pro.frag
    - shaders/fountain_pen_pro.frag
    - shaders/texture_overlay.frag
    - shaders/brush_stamp.frag
    - shaders/watercolor.frag
    - shaders/marker.frag
    - shaders/charcoal.frag
    - shaders/oil_paint.frag
    - shaders/spray_paint.frag
    - shaders/neon_glow.frag
    - shaders/ink_wash.frag
  assets:
    - assets/textures/
    - assets/textures/images/
