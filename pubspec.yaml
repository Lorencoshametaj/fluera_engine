name: nebula_engine
description: >
  A professional 2D canvas engine for Flutter.
  Provides drawing tools, brushes, layers, shapes, text, 
  images, and a complete scene graph system.
version: 1.0.0

environment:
  sdk: ^3.7.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  # UI
  flutter_colorpicker: ^1.1.0
  flutter_riverpod: ^3.0.3
  # Storage & IO
  shared_preferences: ^2.2.3
  path_provider: ^2.1.1
  path: ^1.8.3
  image_picker: ^1.1.2
  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.nebulaengine.nebula_engine
        pluginClass: NebulaEnginePlugin
      ios:
        pluginClass: NebulaEnginePlugin
  assets:
    - assets/textures/
