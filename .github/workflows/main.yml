name: Nebula Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Static Errors
        run: flutter analyze

      - name: Check Formatting
        # Only fails if files are not formatted
        run: dart format --output=none --set-exit-if-changed .

      - name: Run Tests
        run: flutter test --coverage
