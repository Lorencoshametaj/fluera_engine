analyzer:
  exclude:
    - _phase2_disabled/**
  errors:
    # setState in extensions on _FlueraCanvasScreenState is intentional —
    # the extensions are in the same library (via 'part') and act as class methods.
    invalid_use_of_protected_member: ignore
    # Phase 2 state fields, stubs, and methods are intentionally kept for future use.
    # They will be wired up when Phase 2 features are implemented.
    unused_element: ignore
    unused_field: ignore
    unused_local_variable: ignore
    unused_import: ignore
    unused_element_parameter: ignore
    unused_catch_stack: ignore
